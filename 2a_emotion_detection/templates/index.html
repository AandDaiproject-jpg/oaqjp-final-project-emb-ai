<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="/static/mywebscript.js"></script>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                <h1 class="text-center">Emotion Detector Application</h1>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 col-md-offset-3">
                <div class="form-group">
                    <label for="textToAnalyze">Please enter some text to analyze emotions:</label>
                    <textarea class="form-control" id="textToAnalyze" rows="5"></textarea>
                </div>
                <button type="button" class="btn btn-primary btn-block" onclick="sendEmotionData()">Analyze Emotion</button>
                <br>
                <div id="result" class="alert alert-info" style="display: none;"></div>
            </div>
        </div>
    </div>
</body>
</html>
